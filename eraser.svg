<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5B8FD9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6BA3E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B8FD9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8765B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F08866;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8765B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shadowGradLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3D5B9B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B85A3A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shadowGradRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6BA3E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D9704F;stop-opacity:1" />
    </linearGradient>
    <filter id="mainShadow">
      <feDropShadow dx="4" dy="6" stdDeviation="5" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- Голубая часть (верхняя) -->
  <rect x="20" y="20" width="80" height="55" rx="8" fill="url(#blueGrad)" filter="url(#mainShadow)"/>
  
  <!-- Оранжевая часть (основная) -->
  <rect x="20" y="75" width="80" height="75" fill="url(#orangeGrad)"/>
  
  <!-- Белая полоска между частями -->
  <rect x="20" y="70" width="80" height="8" fill="#F5F5F5" opacity="0.95"/>
  
  <!-- Тень на левой стороне голубой части -->
  <polygon points="20,20 20,75 25,75 25,20" fill="#4A5A8A" opacity="0.3"/>
  
  <!-- Тень на левой стороне оранжевой части -->
  <polygon points="20,75 20,150 25,150 25,75" fill="#B84A2A" opacity="0.35"/>
  
  <!-- Тень на правой стороне -->
  <polygon points="100,20 95,20 95,150 100,150" fill="#000000" opacity="0.15"/>
  
  <!-- Блики на голубой части -->
  <ellipse cx="40" cy="35" rx="15" ry="10" fill="#FFFFFF" opacity="0.35"/>
  <ellipse cx="70" cy="38" rx="12" ry="8" fill="#FFFFFF" opacity="0.2"/>
  
  <!-- Блики на оранжевой части -->
  <ellipse cx="35" cy="95" rx="12" ry="10" fill="#FFFFFF" opacity="0.25"/>
  <ellipse cx="75" cy="120" rx="10" ry="8" fill="#FFFFFF" opacity="0.15"/>
  
  <!-- Края скругления -->
  <path d="M 20 20 Q 15 20 15 25 L 15 70 Q 15 75 20 75" fill="url(#shadowGradLeft)" opacity="0.4"/>
  <path d="M 100 20 Q 105 20 105 25 L 105 70 Q 105 75 100 75" fill="url(#shadowGradRight)" opacity="0.3"/>
  
  <!-- Скругления нижних углов -->
  <path d="M 20 145 Q 15 145 15 150 Q 15 155 20 155 L 100 155 Q 105 155 105 150 Q 105 145 100 145" fill="#E8765B"/>
  
  <!-- Тень внизу -->
  <path d="M 20 150 L 100 150 Q 105 150 105 150 L 105 152 Q 105 155 100 155 L 20 155 Q 15 155 15 152 L 15 150" fill="#000000" opacity="0.2"/>
  
  <!-- Мелкие детали и текстура -->
  <circle cx="45" cy="100" r="1.5" fill="#D96B4A" opacity="0.4"/>
  <circle cx="75" cy="110" r="1" fill="#D96B4A" opacity="0.3"/>
  <circle cx="55" cy="130" r="1.2" fill="#D96B4A" opacity="0.35"/>
  <circle cx="85" cy="85" r="0.8" fill="#D96B4A" opacity="0.25"/>
</svg>
