<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200">
  <defs>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFC0CB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB6C1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF1493;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8FC7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4081;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- 3D Параллелепипед ластика в изометрической проекции -->
  
  <!-- Верхняя грань (параллелограмм) -->
  <polygon points="30,50 150,50 180,80 60,80" fill="url(#topGrad)" filter="url(#shadow)"/>
  
  <!-- Левая грань (параллелограмм) - правильный параллелепипед -->
  <polygon points="30,50 60,80 60,150 30,120" fill="url(#leftGrad)"/>
  
  <!-- Правая грань (параллелограмм) - правильный параллелепипед -->
  <polygon points="150,50 180,80 180,150 150,120" fill="url(#rightGrad)"/>
  
  <!-- Передняя грань (прямоугольник) -->
  <polygon points="30,120 150,120 150,150 30,150" fill="#FFB0D0" opacity="0.9"/>
  
  <!-- Блики на верхней грани -->
  <ellipse cx="70" cy="60" rx="25" ry="12" fill="#FFFACD" opacity="0.4"/>
  <ellipse cx="140" cy="65" rx="20" ry="10" fill="#FFFFFF" opacity="0.3"/>
  
  <!-- Тень на левой грани -->
  <polygon points="30,70 40,80 40,140 30,130" fill="#000000" opacity="0.15"/>
  
  <!-- Тень на правой грани -->
  <polygon points="170,70 180,80 180,140 170,130" fill="#000000" opacity="0.1"/>
  
  <!-- Дефекты на поверхности -->
  <circle cx="80" cy="100" r="2" fill="#FF69B4" opacity="0.6"/>
  <circle cx="120" cy="110" r="1.5" fill="#FF1493" opacity="0.5"/>
  <circle cx="50" cy="135" r="1.5" fill="#FF69B4" opacity="0.4"/>
  <circle cx="140" cy="140" r="1" fill="#FF1493" opacity="0.3"/>
  
  <!-- Края между гранями для четкости -->
  <line x1="30" y1="50" x2="60" y2="80" stroke="#FF8FC7" stroke-width="1.5" opacity="0.6"/>
  <line x1="150" y1="50" x2="180" y2="80" stroke="#FF69B4" stroke-width="1.5" opacity="0.6"/>
  <line x1="60" y1="80" x2="180" y2="80" stroke="#FF8FC7" stroke-width="1" opacity="0.5"/>
</svg>
