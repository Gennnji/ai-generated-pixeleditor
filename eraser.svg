<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFC0CB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB6C1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF1493;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8FC7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4081;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Основной куб ластика (розовый) -->
  
  <!-- Верхняя грань (видна полностью) -->
  <rect x="20" y="40" width="160" height="60" fill="url(#topGrad)" filter="url(#shadow)"/>
  
  <!-- Левая грань (изометрия) -->
  <polygon points="20,40 20,120 40,140 40,60" fill="url(#leftGrad)"/>
  
  <!-- Правая грань (изометрия) -->
  <polygon points="180,40 180,120 160,140 160,60" fill="url(#rightGrad)"/>
  
  <!-- Передняя грань (видна частично через перспективу) -->
  <polygon points="40,60 160,60 160,140 40,140" fill="#FFB0D0" opacity="0.9"/>
  
  <!-- Освещение и объем -->
  <!-- Блик на верхней грани слева -->
  <ellipse cx="50" cy="50" rx="30" ry="15" fill="#FFFACD" opacity="0.4"/>
  
  <!-- Блик на верхней грани справа -->
  <ellipse cx="150" cy="50" rx="25" ry="12" fill="#FFFFFF" opacity="0.3"/>
  
  <!-- Тень на левой грани -->
  <polygon points="20,80 20,120 30,110 30,70" fill="#000000" opacity="0.15"/>
  
  <!-- Тень на правой грани -->
  <polygon points="170,80 170,120 160,110 160,70" fill="#000000" opacity="0.1"/>
  
  <!-- Маленькие дефекты/износ на поверхности -->
  <circle cx="60" cy="80" r="2" fill="#FF69B4" opacity="0.6"/>
  <circle cx="120" cy="100" r="1.5" fill="#FF1493" opacity="0.5"/>
  <circle cx="140" cy="75" r="1" fill="#FF69B4" opacity="0.4"/>
  <rect x="80" y="110" width="3" height="2" fill="#FF1493" opacity="0.3"/>
  
  <!-- Край (толщина) между гранями -->
  <line x1="20" y1="40" x2="40" y2="60" stroke="#FF8FC7" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="40" x2="160" y2="60" stroke="#FF69B4" stroke-width="1" opacity="0.5"/>
</svg>
