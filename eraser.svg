<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="eraserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE5D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD4B4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B6914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0522D;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Деревянная ручка -->
  <rect x="55" y="20" width="90" height="140" rx="15" fill="url(#woodGrad)" filter="url(#shadow)"/>
  
  <!-- Текстура дерева на ручке -->
  <line x1="60" y1="40" x2="140" y2="40" stroke="#654321" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="70" x2="140" y2="70" stroke="#654321" stroke-width="1" opacity="0.25"/>
  <line x1="60" y1="100" x2="140" y2="100" stroke="#654321" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="130" x2="140" y2="130" stroke="#654321" stroke-width="1" opacity="0.25"/>
  
  <!-- Резина ластика (розовая) -->
  <rect x="35" y="150" width="130" height="100" rx="8" fill="url(#eraserGrad)" filter="url(#shadow)"/>
  
  <!-- Светлые блики на резине -->
  <ellipse cx="80" cy="170" rx="25" ry="15" fill="#FFFAF0" opacity="0.4"/>
  <ellipse cx="140" cy="190" rx="20" ry="12" fill="#FFFAF0" opacity="0.2"/>
  
  <!-- Тень на резине для глубины -->
  <rect x="35" y="240" width="130" height="8" rx="4" fill="#E8C9B8" opacity="0.5"/>
  
  <!-- Износ резины (текстурность) -->
  <circle cx="55" cy="165" r="2" fill="#D4A5A0" opacity="0.4"/>
  <circle cx="145" cy="175" r="1.5" fill="#D4A5A0" opacity="0.3"/>
  <circle cx="75" cy="220" r="2" fill="#D4A5A0" opacity="0.3"/>
  <circle cx="125" cy="210" r="1.5" fill="#D4A5A0" opacity="0.4"/>
</svg>
