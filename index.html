<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пиксельный редактор</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 Пиксельный редактор</h1>
        </header>

        <div class="main-layout">
            <div class="left-section">
                <div class="editor-container">
                    <div class="canvas-wrapper">
                        <canvas id="gridCanvas"></canvas>
                        <canvas id="canvas"></canvas>
                    </div>
                </div>

                <div class="info">
                    <p>Размер сетки: <span id="canvasInfo">20x20</span> пикселей</p>
                </div>
            </div>

            <div class="right-panel">
                <div class="tools-section">
                    <h3>Параметры</h3>
                    <div class="param-group">
                        <label for="colorPicker">Цвет:</label>
                        <input type="color" id="colorPicker" value="#000000">
                    </div>
                    <div class="param-group">
                        <label for="brushSize">Кисть:</label>
                        <input type="range" id="brushSize" min="1" max="32" value="1">
                        <span id="brushSizeValue">1px</span>
                    </div>
                </div>

                <div class="tools-section">
                    <h3>Сетка</h3>
                    <div class="grid-size-inputs">
                        <div class="size-input">
                            <label for="gridWidth">Ширина:</label>
                            <input type="number" id="gridWidth" min="1" max="100" value="20">
                        </div>
                        <div class="size-input">
                            <label for="gridHeight">Высота:</label>
                            <input type="number" id="gridHeight" min="1" max="100" value="20">
                        </div>
                    </div>
                    <div class="grid-size-buttons">
                        <button id="gridBtn-up-left" class="grid-btn" title="Увеличить влево-вверх">↖️</button>
                        <button id="gridBtn-up" class="grid-btn" title="Увеличить вверх">⬆️</button>
                        <button id="gridBtn-up-right" class="grid-btn" title="Увеличить вправо-вверх">↗️</button>
                        <button id="gridBtn-left" class="grid-btn" title="Увеличить влево">⬅️</button>
                        <button id="gridBtn-all" class="grid-btn" title="Увеличить все">➕</button>
                        <button id="gridBtn-right" class="grid-btn" title="Увеличить вправо">➡️</button>
                        <button id="gridBtn-down-left" class="grid-btn" title="Увеличить влево-вниз">↙️</button>
                        <button id="gridBtn-down" class="grid-btn" title="Увеличить вниз">⬇️</button>
                        <button id="gridBtn-down-right" class="grid-btn" title="Увеличить вправо-вниз">↘️</button>
                    </div>
                </div>

                <div class="tools-section">
                    <h3>Инструменты</h3>
                    <div class="tool-buttons">
                        <button id="eraserBtn" class="tool-btn" title="Ластик">🧹</button>
                        <button id="fillBtn" class="tool-btn" title="Заливка">💧</button>
                        <button id="undoBtn" class="tool-btn" title="Отменить">↶</button>
                        <button id="redoBtn" class="tool-btn" title="Вернуть">↷</button>
                        <button id="clearBtn" class="tool-btn danger" title="Очистить">🗑️</button>
                    </div>
                </div>

                <div class="tools-section">
                    <h3>Экспорт</h3>
                    <div class="export-buttons">
                        <div class="export-group">
                            <span class="export-label">SVG</span>
                            <button id="downloadSVG" class="export-btn" title="Скачать SVG">⬇️</button>
                            <button id="copySVG" class="export-btn" title="Копировать в буфер">📋</button>
                        </div>
                        <div class="export-group">
                            <span class="export-label">PNG</span>
                            <button id="downloadPNG" class="export-btn" title="Скачать PNG">⬇️</button>
                            <button id="copyPNG" class="export-btn" title="Копировать в буфер">📋</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
